# =============================================================================
# Approach 1: Deploy ML pipeline code to Snowflake Internal Stage
# Triggered on push to main — uploads ml_pipeline/*.py to @ML_CODE_STAGE
# =============================================================================
name: Deploy to Snowflake Stage

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ml_pipeline/**'
      - '.github/workflows/deploy-to-stage.yml'

jobs:
  deploy-to-stage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install snowflake-cli-labs snowflake-ml-python snowflake-snowpark-python

      - name: Configure Snowflake connection
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_TOKEN: ${{ secrets.SNOWFLAKE_PROGRAMMATIC_ACCESS_TOKEN }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/config.toml << TOML
          [connections.default]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          authenticator = "PROGRAMMATIC_ACCESS_TOKEN"
          token = "${SNOWFLAKE_TOKEN}"
          role = "${SNOWFLAKE_ROLE}"
          warehouse = "${SNOWFLAKE_WAREHOUSE}"
          database = "${SNOWFLAKE_DATABASE}"
          schema = "${SNOWFLAKE_SCHEMA}"
          TOML
          chmod 600 ~/.snowflake/config.toml

      - name: Upload ML pipeline to stage
        run: |
          snow sql -q "PUT file://ml_pipeline/build_training_set.py @SYNTHEA_DEMO.PATIENTS.ML_CODE_STAGE/ml_pipeline/ AUTO_COMPRESS=FALSE OVERWRITE=TRUE;"
          snow sql -q "PUT file://ml_pipeline/train_and_evaluate.py @SYNTHEA_DEMO.PATIENTS.ML_CODE_STAGE/ml_pipeline/ AUTO_COMPRESS=FALSE OVERWRITE=TRUE;"
          snow sql -q "PUT file://ml_pipeline/notify.py @SYNTHEA_DEMO.PATIENTS.ML_CODE_STAGE/ml_pipeline/ AUTO_COMPRESS=FALSE OVERWRITE=TRUE;"
          snow sql -q "PUT file://ml_pipeline/deploy_dag.py @SYNTHEA_DEMO.PATIENTS.ML_CODE_STAGE/ml_pipeline/ AUTO_COMPRESS=FALSE OVERWRITE=TRUE;"

      - name: Verify upload
        run: |
          snow sql -q "LIST @SYNTHEA_DEMO.PATIENTS.ML_CODE_STAGE/ml_pipeline/;"

      - name: Redeploy DAG (picks up new code from stage)
        run: |
          python ml_pipeline/deploy_dag.py --source stage
