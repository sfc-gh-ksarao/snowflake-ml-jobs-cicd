# =============================================================================
# Approach 2: Refresh Snowflake Git Repository Integration
# Triggered on push to main — tells Snowflake to fetch the latest code
# The DAG reads code directly from @ML_JOBS_GIT_REPO/branches/main/
# =============================================================================
name: Refresh Git Integration

on:
  push:
    branches: [main]
    paths:
      - 'ml_pipeline/**'

jobs:
  refresh-git-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SnowSQL
        run: |
          curl -O https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.3/linux_x86_64/snowsql-1.3.1-linux_x86_64.bash
          SNOWSQL_DEST=~/bin SNOWSQL_LOGIN_SHELL=~/.profile bash snowsql-1.3.1-linux_x86_64.bash
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Refresh Snowflake Git Repository
        env:
          SNOWSQL_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWSQL_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWSQL_TOKEN: ${{ secrets.SNOWFLAKE_PROGRAMMATIC_ACCESS_TOKEN }}
          SNOWSQL_AUTHENTICATOR: PROGRAMMATIC_ACCESS_TOKEN
          SNOWSQL_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWSQL_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWSQL_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWSQL_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
        run: |
          snowsql -q "ALTER GIT REPOSITORY SYNTHEA_DEMO.PATIENTS.ML_JOBS_GIT_REPO FETCH;"

      - name: Verify files accessible
        env:
          SNOWSQL_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWSQL_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWSQL_TOKEN: ${{ secrets.SNOWFLAKE_PROGRAMMATIC_ACCESS_TOKEN }}
          SNOWSQL_AUTHENTICATOR: PROGRAMMATIC_ACCESS_TOKEN
          SNOWSQL_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWSQL_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWSQL_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWSQL_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
        run: |
          snowsql -q "LIST @SYNTHEA_DEMO.PATIENTS.ML_JOBS_GIT_REPO/branches/main/ml_pipeline/;"
