# =============================================================================
# Approach 2: Refresh Snowflake Git Repository Integration
# Triggered on push to main — tells Snowflake to fetch the latest code
# The DAG reads code directly from @ML_JOBS_GIT_REPO/branches/main/
# =============================================================================
name: Refresh Git Integration

on:
  push:
    branches: [main]
    paths:
      - 'ml_pipeline/**'

jobs:
  refresh-git-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Snowflake CLI
        run: |
          pip install snowflake-cli-labs

      - name: Configure Snowflake connection
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_TOKEN: ${{ secrets.SNOWFLAKE_PROGRAMMATIC_ACCESS_TOKEN }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/config.toml << TOML
          [connections.default]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          authenticator = "PROGRAMMATIC_ACCESS_TOKEN"
          token = "${SNOWFLAKE_TOKEN}"
          role = "${SNOWFLAKE_ROLE}"
          warehouse = "${SNOWFLAKE_WAREHOUSE}"
          database = "${SNOWFLAKE_DATABASE}"
          schema = "${SNOWFLAKE_SCHEMA}"
          TOML
          chmod 600 ~/.snowflake/config.toml

      - name: Refresh Snowflake Git Repository
        run: |
          snow sql -q "ALTER GIT REPOSITORY SYNTHEA_DEMO.PATIENTS.ML_JOBS_GIT_REPO FETCH;"

      - name: Verify files accessible
        run: |
          snow sql -q "LIST @SYNTHEA_DEMO.PATIENTS.ML_JOBS_GIT_REPO/branches/main/ml_pipeline/;"
